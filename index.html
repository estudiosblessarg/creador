<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🚗 Admin Autos PRO+</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  box-shadow: 0 0 10px #00000050;
}

button {
  padding: 6px 10px;
  margin: 3px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.add { background: #22c55e; color: white; }
.delete { background: #ef4444; color: white; }
.secondary { background: #3b82f6; color: white; }
.reset { background: #f59e0b; color: black; }

pre {
  background: black;
  padding: 10px;
  font-size: 12px;
  overflow-x: auto;
}
</style>
</head>

<body>

<div class="container">

<h1>🚗 Admin Autos PRO+</h1>

<button class="add" onclick="addMarca()">➕ Marca</button>
<button class="secondary" onclick="generateJSON()">📦 JSON</button>
<button class="secondary" onclick="downloadJSON()">⬇ Descargar</button>
<button class="reset" onclick="resetAll()">🧹 Reset Total</button>

<input type="file" id="fileInput" hidden>
<button class="secondary" onclick="fileInput.click()">📂 Cargar JSON</button>

<div id="app"></div>
<pre id="output"></pre>

</div>

<script>
let db = {}
let version = 1

const enc = v => encodeURIComponent(v)
const dec = v => decodeURIComponent(v)

// ===== CRUD =====

function addMarca() {
  const name = prompt("Marca")
  if (!name) return
  db[name.toLowerCase()] = { modelos: {} }
  render()
}

function addModelo(marca) {
  marca = dec(marca)
  const name = prompt("Modelo")
  if (!name) return
  db[marca].modelos[name.toLowerCase()] = { versiones: {} }
  render()
}

function addVersion(marca, modelo) {
  marca = dec(marca)
  modelo = dec(modelo)
  const name = prompt("Versión")
  if (!name) return
  db[marca].modelos[modelo].versiones[name.toLowerCase()] = { anios: {} }
  render()
}

function addAnio(marca, modelo, ver) {
  marca = dec(marca)
  modelo = dec(modelo)
  ver = dec(ver)

  const anio = prompt("Año")
  const precio = prompt("Precio")

  if (!anio || !precio || isNaN(precio)) {
    alert("Datos inválidos")
    return
  }

  db[marca].modelos[modelo].versiones[ver].anios[anio] = Number(precio)
  render()
}

// ===== DELETE FIX REAL =====

function deleteItem(path) {
  const keys = path.split(".").map(dec)

  if (!confirm("¿Eliminar?")) return

  let ref = db

  // navegar hasta el padre
  for (let i = 0; i < keys.length - 1; i++) {
    if (!ref[keys[i]]) return
    ref = ref[keys[i]].modelos || ref[keys[i]].versiones || ref[keys[i]]
  }

  const lastKey = keys[keys.length - 1]

  if (ref[lastKey]) {
    delete ref[lastKey]
  }

  render()
}

// ===== AÑOS =====

function deleteAnio(marca, modelo, ver, anio) {
  marca = dec(marca)
  modelo = dec(modelo)
  ver = dec(ver)
  anio = dec(anio)

  if (
    db[marca] &&
    db[marca].modelos[modelo] &&
    db[marca].modelos[modelo].versiones[ver] &&
    db[marca].modelos[modelo].versiones[ver].anios[anio]
  ) {
    delete db[marca].modelos[modelo].versiones[ver].anios[anio]
  }

  render()
}

// ===== RESET =====

function resetAll() {
  if (!confirm("⚠️ BORRAR TODO?")) return
  db = {}
  localStorage.clear()
  render()
}

// ===== RENDER =====

function render() {
  const app = document.getElementById("app")
  app.innerHTML = ""

  for (let marca in db) {
    let html = `<div class="card">
      🚗 <b>Marca:</b> ${marca}
      <button class="delete" onclick="deleteItem('${enc(marca)}')">❌</button>
      <button class="add" onclick="addModelo('${enc(marca)}')">➕ Modelo</button>
    `

    for (let modelo in db[marca].modelos) {
      html += `<div class="card">
        🚘 <b>Modelo:</b> ${modelo}
        <button class="delete" onclick="deleteItem('${enc(marca)}.${enc(modelo)}')">❌</button>
        <button class="add" onclick="addVersion('${enc(marca)}','${enc(modelo)}')">➕ Versión</button>
      `

      for (let ver in db[marca].modelos[modelo].versiones) {
        html += `<div class="card">
          ⚙️ <b>Versión:</b> ${ver}
          <button class="delete" onclick="deleteItem('${enc(marca)}.${enc(modelo)}.${enc(ver)}')">❌</button>
          <button class="add" onclick="addAnio('${enc(marca)}','${enc(modelo)}','${enc(ver)}')">➕ Año</button>
        `

        for (let anio in db[marca].modelos[modelo].versiones[ver].anios) {
          const precio = db[marca].modelos[modelo].versiones[ver].anios[anio]

          html += `<div>
            📅 ${anio} → 💰 $${precio}
            <button class="delete" onclick="deleteAnio('${enc(marca)}','${enc(modelo)}','${enc(ver)}','${enc(anio)}')">🗑</button>
          </div>`
        }

        html += `</div>`
      }

      html += `</div>`
    }

    html += `</div>`
    app.innerHTML += html
  }

  localStorage.setItem("autos_db", JSON.stringify(db))
}

// ===== JSON =====

function generateJSON() {
  output.textContent = JSON.stringify(db, null, 2)
}

function downloadJSON() {
  const blob = new Blob([JSON.stringify(db, null, 2)])
  const a = document.createElement("a")

  a.href = URL.createObjectURL(blob)
  a.download = "autos.json"
  a.click()
}

// ===== FILE =====

fileInput.addEventListener("change", e => {
  const file = e.target.files[0]
  const reader = new FileReader()

  reader.onload = ev => {
    db = JSON.parse(ev.target.result)
    render()
  }

  reader.readAsText(file)
})

// ===== INIT =====

const saved = localStorage.getItem("autos_db")
if (saved) db = JSON.parse(saved)

render()
</script>

</body>
</html>
