<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin Autos PRO+</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

button {
  padding: 6px 10px;
  margin: 3px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.add { background: #22c55e; color: white; }
.delete { background: #ef4444; color: white; }
.secondary { background: #3b82f6; color: white; }

pre {
  background: black;
  padding: 10px;
  font-size: 12px;
  overflow-x: auto;
}
</style>
</head>

<body>

<div class="container">

<h1>🚗 Admin Autos PRO+</h1>

<button class="add" onclick="addMarca()">+ Marca</button>
<button class="secondary" onclick="generateJSON()">📦 Generar JSON</button>
<button class="secondary" onclick="downloadJSON()">⬇ Descargar</button>

<input type="file" id="fileInput" accept=".json" hidden>
<button class="secondary" onclick="document.getElementById('fileInput').click()">📂 Cargar JSON</button>

<div id="app"></div>

<pre id="output"></pre>

</div>

<script>
let db = {}
let version = 1

// ===== HELPERS (FIX CLAVE) =====

function enc(v) {
  return encodeURIComponent(v)
}

function dec(v) {
  return decodeURIComponent(v)
}

// ===== UI =====

function addMarca() {
  const name = prompt("Marca")
  if (!name) return

  const key = name.toLowerCase()

  if (db[key]) {
    alert("Ya existe esa marca")
    return
  }

  db[key] = { modelos: {} }
  render()
}

function addModelo(marca) {
  marca = dec(marca)

  const name = prompt("Modelo")
  if (!name) return

  const key = name.toLowerCase()

  db[marca].modelos[key] = { versiones: {} }
  render()
}

function addVersion(marca, modelo) {
  marca = dec(marca)
  modelo = dec(modelo)

  const name = prompt("Versión")
  if (!name) return

  const key = name.toLowerCase()

  db[marca].modelos[modelo].versiones[key] = { anios: {} }
  render()
}

function addAnio(marca, modelo, ver) {
  marca = dec(marca)
  modelo = dec(modelo)
  ver = dec(ver)

  const anio = prompt("Año")
  const precio = prompt("Precio")

  if (!anio || !precio) return

  if (isNaN(precio)) {
    alert("El precio debe ser número")
    return
  }

  db[marca].modelos[modelo].versiones[ver].anios[anio] = Number(precio)
  render()
}

function deleteItem(path) {
  const keys = path.split(".").map(dec)

  if (!confirm("¿Eliminar elemento?")) return

  if (keys.length === 1) delete db[keys[0]]
  if (keys.length === 2) delete db[keys[0]].modelos[keys[1]]
  if (keys.length === 3) delete db[keys[0]].modelos[keys[1]].versiones[keys[2]]

  render()
}

// ===== AÑOS =====

function editAnio(marca, modelo, ver, anio) {
  marca = dec(marca)
  modelo = dec(modelo)
  ver = dec(ver)
  anio = dec(anio)

  const actual = db[marca].modelos[modelo].versiones[ver].anios[anio]

  const nuevo = prompt(`Editar precio (${anio})`, actual)

  if (!nuevo) return

  if (isNaN(nuevo)) {
    alert("Debe ser número")
    return
  }

  db[marca].modelos[modelo].versiones[ver].anios[anio] = Number(nuevo)
  render()
}

function deleteAnio(marca, modelo, ver, anio) {
  marca = dec(marca)
  modelo = dec(modelo)
  ver = dec(ver)
  anio = dec(anio)

  if (!confirm("Eliminar año?")) return

  delete db[marca].modelos[modelo].versiones[ver].anios[anio]
  render()
}

// ===== 🧹 RESET TOTAL =====

function resetAll() {
  if (!confirm("⚠️ Esto borra TODO")) return

  db = {}
  localStorage.removeItem("autos_db")
  localStorage.removeItem("version")

  document.getElementById("app").innerHTML = ""
  document.getElementById("output").textContent = ""

  version = 1

  alert("✅ Todo eliminado")
}

// ===== RENDER =====

function render() {
  const app = document.getElementById("app")
  app.innerHTML = ""

  for (let marca in db) {
    let html = `<div class="card">
      <b>Marca:</b> ${marca}
      <button class="delete" onclick="deleteItem('${enc(marca)}')">X</button>
      <button class="add" onclick="addModelo('${enc(marca)}')">+ Modelo</button>
    `

    for (let modelo in db[marca].modelos) {
      html += `<div class="card">
        <b>Modelo:</b> ${modelo}
        <button class="delete" onclick="deleteItem('${enc(marca)}.${enc(modelo)}')">X</button>
        <button class="add" onclick="addVersion('${enc(marca)}','${enc(modelo)}')">+ Versión</button>
      `

      for (let ver in db[marca].modelos[modelo].versiones) {
        html += `<div class="card">
          <b>Versión:</b> ${ver}
          <button class="delete" onclick="deleteItem('${enc(marca)}.${enc(modelo)}.${enc(ver)}')">X</button>
          <button class="add" onclick="addAnio('${enc(marca)}','${enc(modelo)}','${enc(ver)}')">+ Año</button>
        `

        const anios = db[marca].modelos[modelo].versiones[ver].anios

        for (let anio in anios) {
          html += `<div>
            ${anio}: $${anios[anio]}
            <button class="secondary" onclick="editAnio('${enc(marca)}','${enc(modelo)}','${enc(ver)}','${enc(anio)}')">✏️</button>
            <button class="delete" onclick="deleteAnio('${enc(marca)}','${enc(modelo)}','${enc(ver)}','${enc(anio)}')">🗑</button>
          </div>`
        }

        html += `</div>`
      }

      html += `</div>`
    }

    html += `</div>`
    app.innerHTML += html
  }

  saveLocal()
}

// ===== JSON =====

function generateJSON() {
  document.getElementById("output").textContent =
    JSON.stringify(db, null, 2)
}

// ===== FILE =====

document.getElementById("fileInput").addEventListener("change", loadJSONFile)

function loadJSONFile(event) {
  const file = event.target.files[0]
  if (!file) return

  const reader = new FileReader()

  reader.onload = function(e) {
    try {
      db = JSON.parse(e.target.result)
      render()
      alert("✅ JSON cargado")
    } catch {
      alert("❌ JSON inválido")
    }
  }

  reader.readAsText(file)
}

// ===== DOWNLOAD =====

function getFileName() {
  const d = new Date()
  return `autos_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}_v${version}.json`
}

function downloadJSON() {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" })
  const a = document.createElement("a")

  a.href = URL.createObjectURL(blob)
  a.download = getFileName()
  a.click()

  version++
}

// ===== STORAGE =====

function saveLocal() {
  localStorage.setItem("autos_db", JSON.stringify(db))
}

function loadLocal() {
  const saved = localStorage.getItem("autos_db")
  if (saved) db = JSON.parse(saved)
  render()
}

loadLocal()
</script>

</body>
</html>
